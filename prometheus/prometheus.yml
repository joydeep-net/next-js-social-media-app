global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

remote_write: []

storage:
  tsdb:
    out_of_order_time_window: 30m

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: loki
    static_configs:
      - targets: ['loki:3100']

  - job_name: tempo
    static_configs:
      - targets: ['tempo:3200']
